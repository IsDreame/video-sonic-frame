# ============================================================
# Video Sonic Frame 配置文件
# ============================================================

# ============================================================
# 应用配置
# ============================================================
app:
  # FastAPI 应用标题
  title: "Video Sonic Frame"
  # 监听地址
  host: "127.0.0.1"
  # 监听端口
  port: 8000
  # API 路由前缀
  api_prefix: "/api/v1"
  # 前端静态文件目录（相对于项目根目录）
  static_dir: "src/static"

# ============================================================
# 存储路径配置（相对于项目根目录）
# ============================================================
paths:
  # 上传视频存储目录
  upload_dir: "uploads"
  # 提取的帧图片存储目录
  frames_dir: "frames"
  # 转录元数据 JSON 存储目录
  data_dir: "data"

# ============================================================
# Whisper 语音识别配置
# ============================================================
whisper:
  # 模型大小：tiny / base / small / medium / large
  model: "base"
  # 转录语言：空字符串表示自动检测，指定语言可提高准确度
  # 可选值: zh(中文) en(英语) ja(日语) ko(韩语) fr(法语) de(德语)
  #         es(西班牙语) pt(葡萄牙语) ru(俄语) ar(阿拉伯语) it(意大利语)
  language: "zh"
  # 是否启用词级时间戳
  word_timestamps: true
  # 是否将繁体中文自动转换为简体中文
  convert_to_simplified: true
  # 设备选择：auto（自动检测）/ cuda（强制 GPU）/ cpu（强制 CPU）
  device: "auto"

# ============================================================
# 视频处理配置
# ============================================================
video:
  # 允许上传的视频 MIME 类型
  allowed_mime_types:
    - "video/mp4"
    - "video/x-msvideo"
    - "video/quicktime"
    - "video/x-matroska"
    - "video/webm"
    - "video/x-flv"
    - "video/x-ms-wmv"
    - "video/mpeg"
  # 默认视频扩展名（当无法从文件名获取时）
  default_extension: ".mp4"
  # 默认帧率（当无法从视频元数据获取时）
  default_fps: 30.0

# ============================================================
# 音频提取配置（ffmpeg 参数）
# ============================================================
audio:
  # ffmpeg 可执行文件路径
  ffmpeg_path: "ffmpeg"
  # 音频编码格式
  codec: "pcm_s16le"
  # 采样率（Hz），16000 是 Whisper 推荐值
  sample_rate: "16000"
  # 声道数，1 为单声道
  channels: "1"

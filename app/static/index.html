<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Sonic Frame</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #252538;
    --accent: #00e5bf;
    --accent-dim: #00e5bf22;
    --warn: #f5a623;
    --warn-dim: #f5a62322;
    --text: #e0e0e8;
    --text-dim: #6b6b7b;
    --text-muted: #3d3d50;
    --radius: 10px;
    --radius-sm: 6px;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Noto Sans SC', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
  }

  /* ---- noise overlay ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.03;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 24px 0 32px;
  }
  .logo {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent), #00b8ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: var(--bg);
  }
  .title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .title span { color: var(--accent); }
  .badge {
    font-size: 11px; font-family: var(--font-mono); font-weight: 600;
    background: var(--accent-dim); color: var(--accent);
    padding: 3px 8px; border-radius: 99px; letter-spacing: 0.5px;
  }

  /* ---- Grid Layout ---- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .full { grid-column: 1 / -1; }

  /* ---- Card ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .card-header .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }

  /* ---- Upload Zone ---- */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .upload-zone.uploading { pointer-events: none; opacity: 0.6; }
  .upload-icon {
    font-size: 36px; margin-bottom: 12px; display: block;
  }
  .upload-text { font-size: 14px; color: var(--text-dim); }
  .upload-text strong { color: var(--accent); }
  .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .upload-input { display: none; }

  #uploadProgress {
    margin-top: 12px; height: 3px; border-radius: 3px;
    background: var(--border); overflow: hidden;
  }
  #uploadProgress .bar {
    height: 100%; background: var(--accent);
    transition: width .3s; width: 0%;
  }

  /* ---- Status ---- */
  .status-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 13px; margin-top: 12px;
  }
  .status-bar.success { border-color: var(--accent); }
  .status-bar.error { border-color: #ff5252; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .status-bar.error .status-dot { background: #ff5252; }
  .status-vid { font-family: var(--font-mono); font-size: 12px; color: var(--accent); }

  /* ---- Transcript ---- */
  .transcript-panel {
    max-height: 400px; overflow-y: auto;
  }
  .segment {
    display: flex; gap: 10px; padding: 8px 10px;
    border-radius: var(--radius-sm); cursor: pointer;
    transition: background .15s;
    border-left: 2px solid transparent;
  }
  .segment:hover { background: var(--surface2); }
  .segment.selected {
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }
  .seg-time {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--warn); white-space: nowrap; min-width: 70px;
    padding-top: 2px;
  }
  .seg-text { font-size: 13px; line-height: 1.5; }

  .empty-state {
    text-align: center; padding: 32px 16px; color: var(--text-muted);
    font-size: 13px;
  }

  /* ---- Search ---- */
  .search-row {
    display: flex; gap: 10px;
  }
  .search-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    color: var(--text); font-size: 14px; font-family: var(--font-sans);
    outline: none; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .btn {
    background: var(--accent); color: var(--bg); border: none;
    border-radius: var(--radius-sm); padding: 10px 20px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: var(--font-sans);
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
  }

  /* ---- Frames Gallery ---- */
  .frames-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    max-height: 420px; overflow-y: auto;
  }
  .frame-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); overflow: hidden;
    transition: border-color .2s;
  }
  .frame-card:hover { border-color: var(--accent); }
  .frame-card img {
    width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover;
    background: var(--bg);
  }
  .frame-meta {
    padding: 8px 10px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--warn); display: flex; justify-content: space-between;
  }
  .frame-meta span { color: var(--text-dim); }
  .frame-text {
    padding: 0 10px 10px;
    font-size: 12px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ---- Timestamp input ---- */
  .ts-row {
    display: flex; gap: 10px; align-items: center;
  }
  .ts-input {
    width: 120px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    color: var(--text); font-size: 14px; font-family: var(--font-mono);
    outline: none; transition: border-color .2s;
  }
  .ts-input:focus { border-color: var(--warn); }
  .ts-label { font-size: 13px; color: var(--text-dim); }

  /* ---- Scrollbar ---- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .app { padding: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">SF</div>
    <div class="title">Video <span>Sonic</span> Frame</div>
    <div class="badge">v1.0</div>
  </div>

  <!-- Status Bar -->
  <div id="statusBar" class="full" style="display:none"></div>

  <div class="grid">
    <!-- Upload -->
    <div class="card full" style="padding:0; overflow:hidden">
      <div class="upload-zone" id="uploadZone">
        <span class="upload-icon">&#9654;</span>
        <div class="upload-text">拖拽视频文件到此处，或 <strong>点击选择</strong></div>
        <div class="upload-hint">支持 MP4 / AVI / MOV / MKV / WebM</div>
        <div id="uploadProgress"><div class="bar"></div></div>
      </div>
      <input type="file" class="upload-input" id="fileInput" accept="video/*">
    </div>

    <!-- Transcript -->
    <div class="card">
      <div class="card-header"><span class="dot"></span>转录文字</div>
      <div class="transcript-panel" id="transcriptPanel">
        <div class="empty-state">上传视频后将在此显示转录结果</div>
      </div>
    </div>

    <!-- Search & Frames -->
    <div class="card">
      <div class="card-header"><span class="dot"></span>文字搜帧</div>
      <div class="search-row" style="margin-bottom:16px">
        <input class="search-input" id="searchInput" placeholder="输入关键词搜索对应视频帧..." disabled>
        <button class="btn" id="searchBtn" disabled>搜索</button>
      </div>
      <div id="framesResult" class="empty-state">输入关键词后点击搜索</div>
    </div>

    <!-- Timestamp Frame -->
    <div class="card">
      <div class="card-header"><span class="dot"></span>时间戳取帧</div>
      <div class="ts-row" style="margin-bottom:16px">
        <span class="ts-label">时间（秒）</span>
        <input class="ts-input" id="tsInput" placeholder="10.5" disabled>
        <button class="btn btn-ghost" id="tsBtn" disabled>提取帧</button>
      </div>
      <div id="tsFrame" class="empty-state">输入时间戳后点击提取帧</div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let currentVideoId = null;

// ---- Elements ----
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const progressBar = document.getElementById('uploadProgress').querySelector('.bar');
const statusBar = document.getElementById('statusBar');
const transcriptPanel = document.getElementById('transcriptPanel');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const framesResult = document.getElementById('framesResult');
const tsInput = document.getElementById('tsInput');
const tsBtn = document.getElementById('tsBtn');
const tsFrame = document.getElementById('tsFrame');

// ---- Upload ----
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (file) uploadFile(file);
});

async function uploadFile(file) {
  uploadZone.classList.add('uploading');
  setStatus('info', '正在上传并转录...');

  const xhr = new XMLHttpRequest();
  const fd = new FormData();
  fd.append('file', file);

  xhr.upload.onprogress = e => {
    if (e.lengthComputable) {
      progressBar.style.width = (e.loaded / e.total * 95) + '%';
    }
  };

  xhr.onload = () => {
    progressBar.style.width = '0%';
    uploadZone.classList.remove('uploading');
    if (xhr.status === 200) {
      const data = JSON.parse(xhr.responseText);
      currentVideoId = data.video_id;
      setStatus('success', `上传成功 — Video ID: <span class="status-vid">${data.video_id}</span>`);
      renderTranscript(data.segments);
      enableControls();
    } else {
      const msg = JSON.parse(xhr.responseText)?.detail || '上传失败';
      setStatus('error', msg);
    }
  };

  xhr.onerror = () => {
    progressBar.style.width = '0%';
    uploadZone.classList.remove('uploading');
    setStatus('error', '网络错误，请重试');
  };

  xhr.open('POST', `${API}/videos/upload`);
  xhr.send(fd);
}

function enableControls() {
  searchInput.disabled = false;
  searchBtn.disabled = false;
  tsInput.disabled = false;
  tsBtn.disabled = false;
}

// ---- Status ----
function setStatus(type, html) {
  statusBar.style.display = 'flex';
  statusBar.className = 'status-bar ' + type;
  statusBar.innerHTML = `<span class="status-dot"></span>${html}`;
}

// ---- Transcript ----
function renderTranscript(segments) {
  if (!segments || segments.length === 0) {
    transcriptPanel.innerHTML = '<div class="empty-state">未检测到语音内容</div>';
    return;
  }
  transcriptPanel.innerHTML = segments.map((seg, i) => `
    <div class="segment" data-index="${i}" data-start="${seg.start}" onclick="selectSegment(this)">
      <span class="seg-time">${fmtTime(seg.start)}</span>
      <span class="seg-text">${escHtml(seg.text)}</span>
    </div>
  `).join('');
}

function selectSegment(el) {
  document.querySelectorAll('.segment').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  tsInput.value = el.dataset.start;
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1);
  return `${m}:${sec.padStart(4, '0')}`;
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ---- Search ----
searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const query = searchInput.value.trim();
  if (!query || !currentVideoId) return;

  searchBtn.disabled = true;
  searchBtn.textContent = '搜索中...';

  try {
    const res = await fetch(`${API}/videos/${currentVideoId}/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();

    if (data.matches && data.matches.length > 0) {
      framesResult.innerHTML = `<div class="frames-grid">${data.matches.map(m => `
        <div class="frame-card">
          <img src="data:image/jpeg;base64,${m.frame_base64}" alt="frame at ${m.timestamp}s">
          <div class="frame-meta"><span>&#9202;</span>${fmtTime(m.timestamp)}</div>
          <div class="frame-text">${escHtml(m.text)}</div>
        </div>
      `).join('')}</div>`;
    } else {
      framesResult.innerHTML = '<div class="empty-state">未找到匹配的帧</div>';
    }
  } catch (e) {
    framesResult.innerHTML = '<div class="empty-state">搜索出错，请重试</div>';
  }

  searchBtn.disabled = false;
  searchBtn.textContent = '搜索';
}

// ---- Timestamp Frame ----
tsBtn.addEventListener('click', doGetFrame);

async function doGetFrame() {
  const t = parseFloat(tsInput.value);
  if (isNaN(t) || !currentVideoId) return;

  tsBtn.disabled = true;
  tsBtn.textContent = '提取中...';

  try {
    const res = await fetch(`${API}/videos/${currentVideoId}/frames?t=${t}`);
    const data = await res.json();

    if (data.frame_base64) {
      tsFrame.innerHTML = `
        <div class="frame-card" style="max-width:320px">
          <img src="data:image/jpeg;base64,${data.frame_base64}" alt="frame at ${t}s">
          <div class="frame-meta"><span>&#9202;</span>${fmtTime(data.timestamp)}</div>
        </div>`;
    } else {
      tsFrame.innerHTML = '<div class="empty-state">无法获取该时间戳的帧</div>';
    }
  } catch (e) {
    tsFrame.innerHTML = '<div class="empty-state">获取帧出错</div>';
  }

  tsBtn.disabled = false;
  tsBtn.textContent = '提取帧';
}
</script>
</body>
</html>
